<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>My App Store</title>
  <meta name="description" content="A personal app store for apps I build with Claude Code." />
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#0b0b0f" />
  <!-- iOS add-to-home-screen -->
  <link rel="apple-touch-icon" href="icons/hub-180.png" />
  <link rel="icon" href="icons/hub-180.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="My Apps" />
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; }
    body {
      font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      color: #f4f4f5;
      background:
        radial-gradient(1200px 600px at 20% -10%, #1e1b4b55, transparent 60%),
        radial-gradient(1000px 500px at 100% 0%, #0e747455, transparent 55%),
        #0b0b0f;
      min-height: 100dvh;
      padding:
        max(env(safe-area-inset-top), 22px)
        max(env(safe-area-inset-right), 20px)
        max(env(safe-area-inset-bottom), 40px)
        max(env(safe-area-inset-left), 20px);
    }
    .wrap { max-width: 720px; margin: 0 auto; }
    header { padding: 8px 4px 22px; }
    .eyebrow { font-size: 13px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: #818cf8; }
    h1 { margin: 4px 0 2px; font-size: clamp(30px, 8vw, 42px); letter-spacing: -0.03em; }
    .tagline { margin: 0; color: #a1a1aa; }

    .grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
    @media (min-width: 540px) { .grid { grid-template-columns: 1fr 1fr; } }

    .card {
      display: flex; align-items: center; gap: 14px; text-decoration: none; color: inherit;
      padding: 14px; border-radius: 20px;
      background: rgba(255,255,255,0.045);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(8px);
      transition: transform .12s ease, background .12s ease, border-color .12s ease;
    }
    .card:active { transform: scale(0.975); background: rgba(255,255,255,0.075); }
    @media (hover:hover) { .card:hover { border-color: rgba(255,255,255,0.18); background: rgba(255,255,255,0.07); } }

    .icon {
      flex: 0 0 auto; width: 60px; height: 60px; border-radius: 15px;
      display: grid; place-items: center; font-size: 30px; line-height: 1;
      box-shadow: 0 8px 22px -8px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.25);
    }
    .meta { min-width: 0; }
    .name { font-weight: 650; font-size: 17px; letter-spacing: -.01em; }
    .desc { color: #a1a1aa; font-size: 14px; overflow: hidden; text-overflow: ellipsis;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    .chev { margin-left: auto; flex: 0 0 auto; color: #52525b; font-size: 22px; padding-left: 6px; }

    .empty { color: #71717a; padding: 30px 4px; text-align: center; }

    .install {
      margin-top: 26px; padding: 14px 16px; border-radius: 16px;
      background: rgba(129,140,248,0.10); border: 1px solid rgba(129,140,248,0.22);
      color: #c7d2fe; font-size: 14px; display: flex; gap: 10px; align-items: flex-start;
    }
    .install b { color: #e0e7ff; }
    .install svg { flex: 0 0 auto; margin-top: 1px; }
    footer { margin-top: 28px; text-align: center; color: #52525b; font-size: 12px; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="eyebrow" id="eyebrow">App Store</div>
      <h1 id="title">My App Store</h1>
      <p class="tagline" id="tagline">Apps I build with Claude Code</p>
    </header>

    <main class="grid" id="grid" aria-live="polite">
      <div class="empty">Loading apps…</div>
    </main>

    <section class="install" id="install" hidden>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V4"/><path d="m7 9 5-5 5 5"/><path d="M5 20h14"/></svg>
      <div>To install an app: open it, then tap <b>Share</b> → <b>Add to Home Screen</b>. Each app becomes its own icon.</div>
    </section>

    <footer id="footer"></footer>
  </div>

  <script>
    (async function () {
      const grid = document.getElementById('grid');
      try {
        const res = await fetch('apps.json', { cache: 'no-cache' });
        const store = await res.json();

        if (store.title) {
          document.getElementById('title').textContent = store.title;
          document.title = store.title;
        }
        if (store.tagline) document.getElementById('tagline').textContent = store.tagline;

        const apps = (store.apps || []).filter(Boolean);
        if (!apps.length) {
          grid.innerHTML = '<div class="empty">No apps yet. Run <code>npm run new-app</code> to add one.</div>';
          return;
        }

        grid.innerHTML = '';
        for (const app of apps) {
          const a = document.createElement('a');
          a.className = 'card';
          a.href = 'apps/' + app.slug + '/';
          const c1 = app.color1 || '#7C3AED', c2 = app.color2 || '#2563EB';
          a.innerHTML =
            '<div class="icon" style="background:linear-gradient(145deg,' + c1 + ',' + c2 + ')">' +
              (app.emoji || '🧩') +
            '</div>' +
            '<div class="meta">' +
              '<div class="name"></div>' +
              '<div class="desc"></div>' +
            '</div>' +
            '<div class="chev">›</div>';
          a.querySelector('.name').textContent = app.name || app.slug;
          a.querySelector('.desc').textContent = app.description || '';
          grid.appendChild(a);
        }

        document.getElementById('footer').textContent = apps.length + (apps.length === 1 ? ' app' : ' apps');
      } catch (e) {
        grid.innerHTML = '<div class="empty">Couldn\'t load apps.json — check it\'s valid JSON.</div>';
      }

      // Show the install hint only in the browser (not when already installed).
      var standalone = window.navigator.standalone === true ||
        window.matchMedia('(display-mode: standalone)').matches;
      if (!standalone) document.getElementById('install').hidden = false;
    })();
  </script>
</body>
</html>
