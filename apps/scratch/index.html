<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Scratchpad</title>
  <meta name="description" content="A quick notes pad that saves right on your phone." />
  <link rel="manifest" href="/apps/scratch/manifest.webmanifest" />
  <meta name="theme-color" content="#0b0b0f" />
  <link rel="apple-touch-icon" href="/icons/scratch-180.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="Scratchpad" />
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; height: 100%; }
    body {
      font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      color: #f4f4f5; background: #0b0b0f;
      display: flex; flex-direction: column; height: 100dvh;
      padding: max(env(safe-area-inset-top), 14px) 16px max(env(safe-area-inset-bottom), 12px);
    }
    header { display: flex; align-items: center; gap: 12px; padding: 2px 2px 12px; }
    .badge { width: 40px; height: 40px; border-radius: 11px; display: grid; place-items: center;
             font-size: 20px; background: linear-gradient(145deg, #14B8A6, #22C55E); }
    h1 { margin: 0; font-size: 20px; letter-spacing: -0.02em; flex: 1; }
    a.back { color: #5eead4; text-decoration: none; font-size: 14px; }
    #saved { color: #71717a; font-size: 13px; min-width: 56px; text-align: right; }
    textarea {
      flex: 1; width: 100%; resize: none; border: none; outline: none;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px; padding: 16px; color: #f4f4f5; font-size: 17px; line-height: 1.6;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    textarea::placeholder { color: #52525b; }
    .bar { display: flex; gap: 10px; padding-top: 10px; }
    button { flex: 0 0 auto; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.06);
             color: #e4e4e7; border-radius: 12px; padding: 10px 14px; font-size: 14px; font-weight: 600; }
    button:active { background: rgba(255,255,255,0.12); }
    .count { margin-left: auto; align-self: center; color: #52525b; font-size: 13px; }
  </style>
</head>
<body>
  <header>
    <a class="back" href="/">‹</a>
    <div class="badge">📝</div>
    <h1>Scratchpad</h1>
    <span id="saved"></span>
  </header>

  <textarea id="pad" placeholder="Type anything… it saves automatically, right here on your phone."></textarea>

  <div class="bar">
    <button id="clear">Clear</button>
    <button id="copy">Copy</button>
    <span class="count" id="count">0 chars</span>
  </div>

  <script>
    var KEY = 'scratchpad.text';
    var pad = document.getElementById('pad');
    var saved = document.getElementById('saved');
    var count = document.getElementById('count');
    var t;

    pad.value = localStorage.getItem(KEY) || '';
    update();

    function update() { count.textContent = pad.value.length + ' chars'; }
    function flash(msg) { saved.textContent = msg; clearTimeout(t); t = setTimeout(function(){ saved.textContent = 'Saved'; }, 1000); }

    pad.addEventListener('input', function () {
      localStorage.setItem(KEY, pad.value);
      update();
      flash('Saving…');
    });
    if (pad.value) saved.textContent = 'Saved';

    document.getElementById('clear').addEventListener('click', function () {
      if (!pad.value || confirm('Clear all text?')) {
        pad.value = ''; localStorage.removeItem(KEY); update(); pad.focus();
      }
    });
    document.getElementById('copy').addEventListener('click', async function () {
      try { await navigator.clipboard.writeText(pad.value); flash('Copied'); }
      catch (e) { pad.select(); document.execCommand('copy'); flash('Copied'); }
    });
  </script>
</body>
</html>
